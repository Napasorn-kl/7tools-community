<script>
// ─── APPS SCRIPT CODE (embedded for copy) ────────────────
const GS_CODE = `// ══════════════════════════════════════════
//  เครื่องมือ 7 ชิ้น — Google Apps Script
//  Deploy: Execute as "Me" | Anyone access
// ══════════════════════════════════════════
const SUMMARY_SHEET = '_สรุป';
function getSpreadsheet(){return SpreadsheetApp.getActiveSpreadsheet();}

function doPost(e){
  try{
    const {tool,record}=JSON.parse(e.postData.contents);
    if(!tool||!record)return out({error:'missing tool or record'});
    const ss=getSpreadsheet();
    let sheet=ss.getSheetByName(tool);
    if(!sheet){sheet=ss.insertSheet(tool);}
    const keys=Object.keys(record);
    if(sheet.getLastRow()===0){
      sheet.appendRow(keys);
      sheet.getRange(1,1,1,keys.length).setFontWeight('bold').setBackground('#1e40af').setFontColor('#fff');
      sheet.setFrozenRows(1);sheet.setColumnWidths(1,keys.length,160);
    }else{
      const ex=sheet.getRange(1,1,1,sheet.getLastColumn()).getValues()[0];
      keys.forEach(k=>{if(!ex.includes(k)){const c=sheet.getLastColumn()+1;sheet.getRange(1,c).setValue(k).setFontWeight('bold').setBackground('#1e40af').setFontColor('#fff');sheet.setColumnWidth(c,160);ex.push(k);}});
    }
    const hdrs=sheet.getRange(1,1,1,sheet.getLastColumn()).getValues()[0];
    sheet.appendRow(hdrs.map(h=>record[h]!==undefined?record[h]:''));
    updateSummary(ss);
    return out({success:true,rowCount:sheet.getLastRow()-1});
  }catch(err){return out({error:err.toString()});}
}

function doGet(e){
  try{
    const tool=e.parameter.tool,allP=e.parameter.all,ss=getSpreadsheet();
    if(tool){
      const sheet=ss.getSheetByName(tool);
      if(!sheet||sheet.getLastRow()<2)return out({data:[],tool});
      const vals=sheet.getDataRange().getValues(),hdrs=vals[0];
      return out({data:vals.slice(1).map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;}),tool});
    }
    if(allP){
      const result={};
      ss.getSheets().forEach(s=>{
        const name=s.getName();if(name.startsWith('_'))return;
        if(s.getLastRow()<2){result[name]=[];return;}
        const vals=s.getDataRange().getValues(),hdrs=vals[0];
        result[name]=vals.slice(1).map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=r[i]);return o;});
      });
      return out({all:result});
    }
    const sheets=ss.getSheets().filter(s=>!s.getName().startsWith('_')).map(s=>({name:s.getName(),count:Math.max(0,s.getLastRow()-1)}));
    return out({sheets,ok:true});
  }catch(err){return out({error:err.toString()});}
}

function out(data){return ContentService.createTextOutput(JSON.stringify(data)).setMimeType(ContentService.MimeType.JSON);}
function updateSummary(ss){
  try{
    let s=ss.getSheetByName(SUMMARY_SHEET);if(!s)s=ss.insertSheet(SUMMARY_SHEET,0);
    s.clearContents();s.appendRow(['เครื่องมือ','จำนวนรายการ','อัปเดตล่าสุด']);
    s.getRange(1,1,1,3).setFontWeight('bold').setBackground('#0f172a').setFontColor('#fff');
    ss.getSheets().forEach(sh=>{if(!sh.getName().startsWith('_'))s.appendRow([sh.getName(),Math.max(0,sh.getLastRow()-1),new Date().toLocaleString('th-TH')]);});
    s.setColumnWidths(1,3,200);
  }catch(e){}
}`;

// ─── STORAGE ─────────────────────────────────────────────
const STORE = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)||'[]'); } catch { return []; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  add(key, obj) {
    const arr = this.get(key);
    obj._id   = Date.now()+'';
    obj._date = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
    arr.unshift(obj);
    this.set(key, arr);
    return obj;
  },
  del(key, id) { this.set(key, this.get(key).filter(r=>r._id!==id)); },
  merge(key, cloudRows) {
    // Merge cloud rows into local, keeping local additions not yet in cloud
    const local  = this.get(key);
    const cloudIds = new Set(cloudRows.map(r=>r._id).filter(Boolean));
    // Add local-only records (not in cloud) + all cloud records
    const localOnly = local.filter(r => r._id && !cloudIds.has(r._id));
    const merged = [...cloudRows, ...localOnly]
      .sort((a,b) => (b._id||0) > (a._id||0) ? 1 : -1);
    this.set(key, merged);
    return merged;
  }
};

// ─── GOOGLE SHEETS SYNC ──────────────────────────────────
const SHEETS_URL_KEY = 'gs_url';
let syncStatus = 'local'; // 'local' | 'connected' | 'syncing' | 'error'

// Visitor mode: URL has ?sheet=... param → auto-config, no setup needed
const _urlSheetParam = new URLSearchParams(window.location.search).get('sheet');
const isVisitorMode  = !!_urlSheetParam;

function getSheetsURL() {
  // URL param takes precedence (visitor/shared mode)
  if (_urlSheetParam) return decodeURIComponent(_urlSheetParam);
  return localStorage.getItem(SHEETS_URL_KEY)||'';
}
function setSheetsURL(url) { localStorage.setItem(SHEETS_URL_KEY, url); }

function getShareURL() {
  const url = getSheetsURL();
  if (!url) return '';
  const base = window.location.origin + window.location.pathname;
  return base + '?sheet=' + encodeURIComponent(url);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>{
    toast('คัดลอกแล้ว 📋','green');
  }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('คัดลอกแล้ว 📋','green');
  });
}

function copyShareURL() {
  const u = getShareURL();
  if (!u) { toast('ยังไม่ได้เชื่อมต่อ Sheets','red'); return; }
  copyText(u);
}

// ── URL Shortener (is.gd — free, CORS-friendly) ─────────
const SHORT_URL_KEY = 'gs_short_url';

async function shortenURL(longUrl) {
  // Return cached short URL if same long URL
  try {
    const cached = JSON.parse(localStorage.getItem(SHORT_URL_KEY)||'null');
    if (cached && cached.long === longUrl) return cached.short;
  } catch(_) {}

  try {
    const res = await fetch(
      `https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`
    );
    if (!res.ok) throw new Error('API error');
    const short = (await res.text()).trim();
    if (short.startsWith('http')) {
      localStorage.setItem(SHORT_URL_KEY, JSON.stringify({ long: longUrl, short }));
      return short;
    }
  } catch(e) { console.warn('Shorten failed', e); }
  return null; // fallback to long URL
}

async function renderShareBox() {
  const shareBox = document.getElementById('share-url-box');
  if (!shareBox) return;
  const longUrl  = getShareURL();
  if (!longUrl)  { shareBox.innerHTML = ''; return; }

  // Show loading state immediately
  shareBox.innerHTML = `
    <div class="rounded-2xl p-4 bg-blue-50 border-2 border-blue-200 mb-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xl">🔗</span>
        <div>
          <div class="font-bold text-blue-800 text-sm">URL สำหรับแชร์</div>
          <div class="text-xs text-blue-500">คนที่เปิด URL นี้กรอกข้อมูลได้เลย ไม่ต้องตั้งค่า</div>
        </div>
      </div>
      <div id="share-url-display" class="bg-white border-2 border-blue-100 rounded-xl px-4 py-3 mb-3 text-center text-sm text-gray-400 animate-pulse">
        กำลังสร้าง URL สั้น...
      </div>
      <button onclick="copyShareURLShort()" id="copy-short-btn"
        class="w-full py-3 rounded-xl font-bold text-white text-sm opacity-50 cursor-wait" style="background:#2563eb">
        📋 คัดลอก URL
      </button>
    </div>`;

  // Fetch short URL in background
  const short = await shortenURL(longUrl);
  const display = document.getElementById('share-url-display');
  const copyBtn = document.getElementById('copy-short-btn');
  if (!display) return;

  if (short) {
    window._currentShareUrl = short;
    display.innerHTML = `
      <div class="font-bold text-blue-700 text-base tracking-wide">${short}</div>
      <div class="text-xs text-gray-400 mt-0.5">ส่งให้ผู้กรอกข้อมูลได้เลย</div>`;
    display.className = 'bg-white border-2 border-blue-200 rounded-xl px-4 py-3 mb-3 text-center cursor-pointer';
    display.onclick = () => copyText(short);
  } else {
    window._currentShareUrl = longUrl;
    display.innerHTML = `<div class="text-xs font-mono text-gray-500 break-all">${longUrl}</div>`;
    display.className = 'bg-white border-2 border-gray-200 rounded-xl px-4 py-3 mb-3 text-center cursor-pointer';

    copyBtn.style.background = '#2563eb';
    copyBtn.style.cursor = 'pointer';
  }

function copyShareURLShort() {

  if (!u) { toast('ยังไม่ได้เชื่อมต่อ Sheets','red'); return; }
  copyText(u);
}

async function pushToSheets(toolKey, record) {
  const url = getSheetsURL(); if (!url) return;
  try {
    await fetch(url, {
      method: 'POST',
      mode:   'no-cors',          // ← bypass CORS for POST; data IS written, response is opaque
      body:   JSON.stringify({ tool: toolKey, record })
    });
  } catch(e) { console.warn('Sheets push failed', e); }
}

async function pullFromSheets(toolKey) {
  const url = getSheetsURL(); if (!url) return null;
  try {
    const res  = await fetch(`${url}?tool=${encodeURIComponent(toolKey)}`);
    const json = await res.json();
    return json.data || null;
  } catch(e) { return null; }
}

async function pullAllFromSheets() {
  const url = getSheetsURL(); if (!url) return null;
  try {
    const res  = await fetch(`${url}?all=1`);
    const json = await res.json();
    return json.all || null;
  } catch(e) { return null; }
}

async function testConnection(url) {
  try {
    const res  = await fetch(`${url}?ping=1`, { signal: AbortSignal.timeout(8000) });
    const json = await res.json();
    return json.ok || json.sheets !== undefined || !!json.all || true; // any valid JSON = ok
  } catch(e) { return false; }
}

let curPage = 'home', prevPage = null, formState = {};

// ─── NAV ─────────────────────────────────────────────────
function nav(page) {
  prevPage = curPage; curPage = page;
  closeSheet(); closeSettings();
  updateNav(); refreshCounts(); renderPage();
}
function goBack() { nav(prevPage||'home'); }

function updateNav() {
  document.querySelectorAll('.snav,.bnav-btn').forEach(b=>b.classList.remove('active'));
  const sn = document.getElementById('sn-'+curPage);
  if (sn) sn.classList.add('active');
  if (curPage==='home') document.getElementById('bn-home')?.classList.add('active');
  if (curPage==='data') document.getElementById('bn-data')?.classList.add('active');
  if (TOOLS.find(t=>t.id===curPage)) document.getElementById('bn-tools')?.classList.add('active');

  const back  = document.getElementById('top-back');
  const logo  = document.getElementById('top-logo');
  const title = document.getElementById('top-title');
  const tool  = TOOLS.find(t=>t.id===curPage);
  if (tool) {
    back?.classList.remove('hidden'); logo?.classList.add('hidden');
    if (title) title.textContent = tool.name;
  } else {
    back?.classList.add('hidden'); logo?.classList.remove('hidden');
    if (title) title.textContent = curPage==='data'?'ข้อมูลทั้งหมด':'เครื่องมือ 7 ชิ้น';
  }
  updateStatusUI();
}

function refreshCounts() {
  TOOLS.forEach(t=>{
    const el=document.getElementById('cnt-'+t.id);
    if(el) el.textContent=STORE.get(t.key).length;
  });
}

function openSheet() {
  document.getElementById('sheet-tools').innerHTML = TOOLS.map(t=>{
    const c=CLR[t.color], cnt=STORE.get(t.key).length;
    return `<button onclick="nav('${t.id}')" class="flex items-center gap-3 p-4 rounded-2xl ${c.bg} border ${c.brd} text-left transition-transform active:scale-98">
      <div class="ticon ${c.bi}">${t.icon}</div>
      <div class="flex-1">
        <div class="font-bold text-gray-800 text-sm">${t.name}</div>
        <div class="text-xs ${c.tx} mt-0.5">${cnt>0?cnt+' รายการ':t.desc}</div>
      </div><div class="text-gray-300 text-lg">›</div></button>`;
  }).join('');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function showWizard() {
  wizStep = 0;
  document.getElementById('connected-state').classList.add('hidden');
  document.getElementById('wizard-state').classList.remove('hidden');
  renderWizStep();
}
function showConnected() {
  document.getElementById('wizard-state').classList.add('hidden');
  document.getElementById('connected-state').classList.remove('hidden');
  const url = getSheetsURL();
  const inp = document.getElementById('sheets-url-input');
  if (inp) inp.value = url;
  renderShareBox(); // async — shows loading then short URL
  renderSettingsBanner();
}

function wizNext() { if(wizStep < WIZ_STEPS.length-1){ wizStep++; renderWizStep(); } }
function wizBack() { if(wizStep > 0){ wizStep--; renderWizStep(); } }

function renderWizStep() {
  const s = WIZ_STEPS[wizStep];
  const total = WIZ_STEPS.length;
  document.getElementById('wiz-dots').innerHTML = WIZ_STEPS.map((_,i)=>
    `<div style="width:${i===wizStep?'24px':'8px'};height:8px;border-radius:4px;background:${i===wizStep?'#2563eb':i<wizStep?'#93c5fd':'#e2e8f0'};transition:all .2s"></div>`
  ).join('');
  document.getElementById('wiz-steps').innerHTML = `
    <div class="rounded-2xl p-5 mb-4 border-2" style="background:${s.bg};border-color:${s.border}">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0" style="background:${s.border}">${s.icon}</div>
        <div>
          <div class="text-xs font-semibold" style="color:${s.color}">ขั้นตอนที่ ${wizStep+1} จาก ${total}</div>
          <div class="font-bold text-gray-800 text-base leading-tight mt-0.5">${s.title}</div>
        </div>
      </div>
      ${s.body}
    </div>`;
  // restore URL value if on last step
  if (wizStep === WIZ_STEPS.length - 1 && wizUrlVal) {
    const inp = document.getElementById('wiz-url-input');
    if (inp) inp.value = wizUrlVal;
  }
  const back = document.getElementById('wiz-back');
  const next = document.getElementById('wiz-next');
  if (wizStep === 0) back.classList.add('hidden'); else back.classList.remove('hidden');
  if (wizStep === total-1) next.classList.add('hidden'); else next.classList.remove('hidden');
}

async function finishWizard() {
  // read from global var first, fallback to element
  const inp = document.getElementById('wiz-url-input');
  if (inp && inp.value.trim()) wizUrlVal = inp.value.trim();
  const url = wizUrlVal.trim();
  if (!url) { toast('กรุณาวาง URL ก่อน','red'); inp?.focus(); return; }
  if (!url.startsWith('https://script.google.com')) {
    toast('URL ไม่ถูกต้อง — ต้องขึ้นต้นด้วย https://script.google.com','red'); return;
  }
  setSheetsURL(url);
  const si = document.getElementById('sheets-url-input');
  if (si) si.value = url;
  syncStatus='connected'; wizUrlVal='';
  updateStatusUI(); showConnected(); renderSettingsBanner();
  toast('เชื่อมต่อ Google Sheets สำเร็จ 🎉','green');
}

async function testWizUrl() {
  const inp = document.getElementById('wiz-url-input');
  if (inp && inp.value.trim()) wizUrlVal = inp.value.trim();
  const url = wizUrlVal.trim();
  if (!url) { toast('กรุณาวาง URL ก่อน','red'); inp?.focus(); return; }
  toast('กำลังทดสอบ...','blue');
  const ok = await testConnection(url);
  if (ok) {
    setSheetsURL(url); syncStatus='connected';
    toast('✅ เชื่อมต่อสำเร็จ! กด "เชื่อมต่อเลย!" ได้เลย','green');
  } else {
    syncStatus='error';
    toast('เชื่อมต่อล้มเหลว — ตรวจสอบ URL อีกครั้ง','red');
  }
  updateStatusUI();
}

function openSettings() {
  const url = getSheetsURL();
  if (url) {
    showConnected();
  } else {
    showWizard();
  }
  document.getElementById('settings-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  document.body.style.overflow='';
}

function renderSettingsBanner() {
  const url = getSheetsURL();
  const banner = document.getElementById('settings-status-banner');
  if (!banner) return;
  if (!url) { banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  const ok = syncStatus==='connected';
  banner.className = `rounded-2xl p-4 mb-4 ${ok?'bg-green-50 border-2 border-green-200':'bg-amber-50 border-2 border-amber-200'}`;
  document.getElementById('banner-icon').textContent = ok?'✅':'⚠️';
  document.getElementById('banner-title').textContent = ok?'เชื่อมต่อ Google Sheets สำเร็จ':'ตั้งค่า URL แล้ว (ยังไม่ได้ทดสอบ)';
  const sub = document.getElementById('banner-sub');
  sub.textContent = ok?'ข้อมูลซิงค์อัตโนมัติทุกครั้งที่บันทึก':'กด "ทดสอบ" เพื่อยืนยัน';
  sub.className = `text-xs mt-0.5 ${ok?'text-green-600':'text-amber-600'}`;
}

async function testSheetsConnection() {
  const url = document.getElementById('sheets-url-input').value.trim();
  if (!url) { toast('กรุณากรอก URL ก่อน','red'); return; }
  toast('กำลังทดสอบ...','blue');
  const ok = await testConnection(url);
  if (ok) {
    setSheetsURL(url); syncStatus='connected';
    toast('เชื่อมต่อสำเร็จ 🎉','green');
  } else {
    syncStatus='error';
    toast('เชื่อมต่อล้มเหลว — ตรวจสอบ URL','red');
  }
  renderSettingsBanner(); updateStatusUI();
}

function saveSheetsURL() {
  const url = document.getElementById('sheets-url-input').value.trim();
  if (url && !url.startsWith('https://script.google.com')) {
    toast('URL ไม่ถูกต้อง ควรเริ่มต้นด้วย https://script.google.com','red'); return;
  }
  setSheetsURL(url);
  syncStatus = url ? 'connected' : 'local';
  toast(url?'บันทึก URL สำเร็จ':'ยกเลิกการเชื่อมต่อแล้ว', url?'green':'red');
  renderSettingsBanner(); updateStatusUI();
}

function clearSheetsURL() {
  if (!confirm('ยกเลิกการเชื่อมต่อ Google Sheets?')) return;
  localStorage.removeItem(SHEETS_URL_KEY);
  const inp = document.getElementById('sheets-url-input');
  if(inp) inp.value='';
  syncStatus='local';
  showWizard(); updateStatusUI();
  toast('ยกเลิกการเชื่อมต่อแล้ว','red');
}

function copyGSCode() {
  navigator.clipboard.writeText(GS_CODE).then(()=>{
    const btn=document.getElementById('copy-gs-btn');
    btn.innerHTML='<span class="text-3xl">✅</span><span>Copied แล้ว!</span>';
    setTimeout(()=>{
      btn.innerHTML='<span class="text-3xl">📋</span><span>แตะเพื่อ Copy Code</span>';
    },2000);
    toast('Copy Code สำเร็จ — วางใน Apps Script ได้เลย','green');
  }).catch(()=>toast('Copy ไม่ได้ — ลองอีกครั้ง','red'));
}

  pg.className='page-inner mx-auto px-4 pt-4 pb-4 fade-in';
  if (curPage==='home') { pg.innerHTML=renderHome(); return; }
  if (curPage==='data') { pg.innerHTML=renderData(); return; }
  const tool=TOOLS.find(t=>t.id===curPage);
  if (tool) { pg.innerHTML=renderTool(tool); return; }
}

          <div class="text-sm text-gray-400 mt-0.5 truncate">${t.desc}</div>
        </div>
        <div class="text-gray-300 text-xl flex-shrink-0">›</div>
      </button>`;
    }).join('')}
  </div>`;
}

// ─── TOOL FORM ───────────────────────────────────────────
function renderTool(tool) {
  const c=CLR[tool.color], records=STORE.get(tool.key), fs=formState[tool.id]||{};
  return `
  <div class="card ${c.bg} border ${c.brd} mb-4 flex items-center gap-3 py-4">
    <div class="ticon ${c.bi}">${tool.icon}</div>
    <div><div class="text-xs font-semibold ${c.tx}">${tool.sub}</div><div class="font-bold text-gray-800">${tool.name}</div></div>
  </div>

  <form id="tool-form" onsubmit="submitForm(event,'${tool.id}')" novalidate>
    <div class="card mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-2">${tool.pLabel} <span class="text-red-400">*</span></label>
      <input type="text" name="${tool.pKey}" required value="${esc(fs[tool.pKey]||'')}"
        placeholder="${tool.pHint}" class="fi" style="font-size:17px;padding:16px 18px;font-weight:600"
        autocomplete="off" oninput="ss('${tool.id}',this.name,this.value)">
    </div>

    <div class="card mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-3">${tool.tLabel} <span class="text-red-400">*</span></label>
      <div class="flex flex-wrap gap-2">
        ${tool.types.map(tp=>`<button type="button" class="chip ${fs[tool.tKey]===tp?'selected':''}" style="${fs[tool.tKey]===tp?c.chip:''}"
          onclick="pickChip('${tool.id}','${tool.tKey}','${tp}',this,'${c.chip}')">${tp}</button>`).join('')}
      </div>
      <input type="hidden" name="${tool.tKey}" id="hid-${tool.id}-${tool.tKey}" value="${esc(fs[tool.tKey]||'')}">
    </div>

    <div class="card mb-4">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">ข้อมูลหลัก</div>
      <div class="space-y-4">${renderFields(tool.main,fs,tool.id,c)}</div>
    </div>

    <details class="card mb-5" ${Object.keys(fs).some(k=>tool.extra.find(f=>f.k===k)&&fs[k])?'open':''}>
      <summary class="flex items-center justify-between -m-1 p-1 rounded-xl">
        <span class="text-sm font-semibold text-gray-500">ข้อมูลเพิ่มเติม</span>
        <span class="text-gray-400 text-xs bg-gray-100 px-3 py-1 rounded-full">ไม่บังคับ ▾</span>
      </summary>
      <div class="mt-4 space-y-4">${renderFields(tool.extra,fs,tool.id,c)}</div>
    </details>

    <button type="submit" class="submit-btn text-white mb-6" style="${c.btn};border-radius:18px">
      💾  บันทึกข้อมูล${getSheetsURL()?'  &amp;  📡 ซิงค์ Sheets':''}
    </button>
  </form>

  ${records.length>0?`
  <div class="mb-4">
    <div class="flex items-center justify-between mb-3">
      <div class="font-bold text-gray-700">บันทึกแล้ว (${records.length})</div>
      <div class="flex gap-3">
        ${getSheetsURL()?`<button onclick="syncTool('${tool.key}')" class="text-sm text-blue-500 font-semibold bg-blue-50 px-3 py-1.5 rounded-xl">🔄 ซิงค์</button>`:''}
        <button onclick="exportCSV('${tool.key}')" class="text-sm text-green-600 font-semibold bg-green-50 px-3 py-1.5 rounded-xl">⬇ CSV</button>
      </div>
    </div>
    ${records.slice(0,8).map(r=>`
    <div class="rec-card">
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-gray-800 text-sm">${esc(r[tool.pKey]||'—')}</div>
        <div class="flex flex-wrap gap-2 mt-1 items-center">
          ${r[tool.tKey]?`<span class="text-xs px-2 py-0.5 rounded-full ${c.tag}">${r[tool.tKey]}</span>`:''}
          <span class="text-xs text-gray-400">${r._date}</span>
          ${r.informant?`<span class="text-xs text-gray-400">โดย ${r.informant}</span>`:''}
        </div>
      </div>
      <button onclick="delRec('${tool.key}','${r._id}')" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-300 hover:text-red-500 hover:bg-red-50 text-xl transition-colors flex-shrink-0">×</button>
    </div>`).join('')}
    ${records.length>8?`<div class="text-center text-sm text-gray-400 mt-2">และอีก ${records.length-8} รายการ · <button onclick="nav('data')" class="text-blue-500 underline">ดูทั้งหมด</button></div>`:''}
  </div>`:''}`;
}

// ─── FIELD RENDERERS ─────────────────────────────────────
function renderFields(fields,fs,tid,c) {
  let html='',buf=[];
  const flush=()=>{ if(!buf.length)return; html+=`<div class="grid grid-cols-2 gap-3">${buf.join('')}</div>`; buf=[]; };
  for(const f of fields){ if(f.inline) buf.push(fld(f,fs,tid,c)); else{ flush(); html+=fld(f,fs,tid,c); } }
  flush(); return html;
}

function fld(f,fs,tid,c) {
  const v=fs[f.k]||(f.remember?localStorage.getItem('rem_'+f.k)||'':'');
  const ch=`oninput="ss('${tid}','${f.k}',this.value)"`;
  const lbl=`<label class="block text-sm font-semibold text-gray-600 mb-1.5">${f.label}</label>`;
  const hint=f.hint?`<p class="text-xs text-gray-400 mt-1.5">${f.hint}</p>`:'';

  if(f.type==='gps') return `<div>${lbl}<div class="flex gap-2">
    <input type="text" name="${f.k}_lat" placeholder="ละติจูด" value="${esc(fs[f.k+'_lat']||'')}" class="fi text-sm flex-1 min-w-0" inputmode="decimal" oninput="ss('${tid}','${f.k}_lat',this.value)">
    <input type="text" name="${f.k}_lng" placeholder="ลองจิจูด" value="${esc(fs[f.k+'_lng']||'')}" class="fi text-sm flex-1 min-w-0" inputmode="decimal" oninput="ss('${tid}','${f.k}_lng',this.value)">
    <button type="button" class="gps-btn flex-shrink-0" onclick="getGPS('${tid}','${f.k}')">📍</button>
    </div></div>`;

  if(f.type==='chip2') return `<div>${lbl}<div class="flex flex-wrap gap-2">
    ${f.opts.map(o=>`<button type="button" class="chip ${v===o?'selected':''}" style="${v===o?c.chip:''}"
      onclick="pickChip('${tid}','${f.k}','${o}',this,'${c.chip}')">${o}</button>`).join('')}
    </div><input type="hidden" name="${f.k}" id="hid-${tid}-${f.k}" value="${esc(v)}"></div>`;

  if(f.type==='monthchip') return `<div>${lbl}<div class="flex flex-wrap gap-2">
    ${MONTHS.map(m=>`<button type="button" class="chip ${v===m?'selected':''}" style="${v===m?c.chip:''}"
      onclick="pickChip('${tid}','${f.k}','${m}',this,'${c.chip}')">${m.substring(0,3)}</button>`).join('')}
    <button type="button" class="chip ${'ตลอดปี'===v?'selected':''}" style="${'ตลอดปี'===v?c.chip:''}"
      onclick="pickChip('${tid}','${f.k}','ตลอดปี',this,'${c.chip}')">ตลอดปี</button>
    </div><input type="hidden" name="${f.k}" id="hid-${tid}-${f.k}" value="${esc(v)}"></div>`;

  if(f.type==='select') return `<div>${lbl}<select name="${f.k}" class="fi" ${ch}>
    <option value="">— เลือก —</option>
    ${f.opts.map(o=>`<option ${v===o?'selected':''} value="${o}">${o}</option>`).join('')}
    </select>${hint}</div>`;

  if(f.type==='textarea') return `<div>${lbl}<textarea name="${f.k}" rows="3" class="fi" placeholder="${f.hint||''}" ${ch}>${esc(v)}</textarea>${hint}</div>`;

  if(f.type==='date'){const today=new Date().toISOString().split('T')[0];return `<div>${lbl}<input type="date" name="${f.k}" value="${v||today}" class="fi" ${ch}></div>`;}

  if(f.type==='number') return `<div>${lbl}<input type="number" name="${f.k}" value="${esc(v)}" placeholder="${f.placeholder||''}" class="fi" min="0" inputmode="numeric" pattern="[0-9]*" ${ch}></div>`;

  return `<div>${lbl}<input type="text" name="${f.k}" value="${esc(v)}" placeholder="${f.placeholder||f.hint||''}" class="fi" autocomplete="off" ${ch}>${hint}</div>`;
}

// ─── DATA VIEW ───────────────────────────────────────────
function renderData() {
  const total=TOOLS.reduce((s,t)=>s+STORE.get(t.key).length,0);
  const hasSheets=!!getSheetsURL();
  return `
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-lg font-bold text-gray-800">ข้อมูลทั้งหมด</h2>
      <p class="text-sm text-gray-400">${total} รายการ</p>
    </div>
    <div class="flex gap-2">
      ${hasSheets?`<button onclick="syncAllNow()" class="bg-blue-50 text-blue-600 px-3 py-2.5 rounded-xl text-sm font-bold border-2 border-blue-200">🔄 ซิงค์</button>`:''}
      <button onclick="exportAll()" class="bg-green-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold">⬇ CSV</button>
    </div>
  </div>
  ${!hasSheets?`<div class="card bg-amber-50 border-amber-200 mb-4 flex items-center gap-3 cursor-pointer" onclick="openSettings()">
    <span class="text-xl">💡</span>
    <div class="flex-1 text-sm"><span class="font-semibold text-amber-800">ยังไม่ได้เชื่อมต่อ Google Sheets</span><br><span class="text-amber-600 text-xs">ข้อมูลเก็บในเครื่องนี้เท่านั้น — แตะเพื่อตั้งค่า</span></div>
    <span class="text-amber-400">›</span>
  </div>`:''}
  ${TOOLS.map(t=>{
    const c=CLR[t.color],recs=STORE.get(t.key);
    return `<div class="card mb-3">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">${t.icon}</span>
          <span class="font-bold text-gray-700 text-sm">${t.name}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${c.tag} font-semibold">${recs.length}</span>
        </div>
        <div class="flex gap-3">
          <button onclick="nav('${t.id}')" class="text-xs text-blue-500 font-semibold">+ เพิ่ม</button>
          ${recs.length?`<button onclick="exportCSV('${t.key}')" class="text-xs text-green-500 font-semibold">⬇ CSV</button>`:''}
        </div>
      </div>
      ${!recs.length?`<p class="text-sm text-gray-400 text-center py-3">ยังไม่มีข้อมูล</p>`:
        recs.slice(0,4).map(r=>`<div class="rec-card">
          <div class="flex-1 min-w-0 text-sm">
            <span class="font-semibold text-gray-800">${esc(r[t.pKey]||'—')}</span>
            ${r[t.tKey]?`<span class="ml-2 text-xs px-2 py-0.5 rounded-full ${c.tag}">${r[t.tKey]}</span>`:''}
            <span class="ml-2 text-xs text-gray-400">${r._date}</span>
          </div>
          <button onclick="delRec('${t.key}','${r._id}')" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-300 hover:text-red-500 text-xl flex-shrink-0">×</button>
        </div>`).join('')+(recs.length>4?`<div class="text-xs text-gray-400 text-center mt-2">และอีก ${recs.length-4} รายการ</div>`:'')}
    </div>`;
  }).join('')}`;
}

// ─── ACTIONS ─────────────────────────────────────────────
function ss(tid,k,v){if(!formState[tid])formState[tid]={};formState[tid][k]=v;}

function pickChip(tid,key,val,btn,cs){
  btn.parentElement.querySelectorAll('.chip').forEach(c=>{c.classList.remove('selected');c.removeAttribute('style');});
  btn.classList.add('selected');btn.setAttribute('style',cs);
  const h=document.getElementById('hid-'+tid+'-'+key);if(h)h.value=val;
  ss(tid,key,val);
}

function getGPS(tid,fk){
  if(!navigator.geolocation){toast('เบราว์เซอร์ไม่รองรับ GPS','red');return;}
  toast('กำลังระบุตำแหน่ง...','blue');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
    ss(tid,fk+'_lat',lat);ss(tid,fk+'_lng',lng);
    const e1=document.querySelector(`[name="${fk}_lat"]`),e2=document.querySelector(`[name="${fk}_lng"]`);
    if(e1)e1.value=lat;if(e2)e2.value=lng;
    toast('บันทึกพิกัดสำเร็จ 📍','green');
  },()=>toast('ไม่สามารถระบุตำแหน่งได้','red'));
}

async function submitForm(e,tid){
  e.preventDefault();
  const tool=TOOLS.find(t=>t.id===tid);
  const form=document.getElementById('tool-form');
  const fd=new FormData(form);
  const pv=(fd.get(tool.pKey)||'').trim(), tv=fd.get(tool.tKey)||'';
  if(!pv){toast('กรุณากรอก '+tool.pLabel,'red');form.querySelector(`[name="${tool.pKey}"]`).focus();return;}
  if(!tv){toast('กรุณาเลือก '+tool.tLabel,'red');return;}

  const rec={};
  fd.forEach((v,k)=>{if(v)rec[k]=v.trim();});
  STORE.add(tool.key,rec);
  if(rec.informant) localStorage.setItem('rem_informant',rec.informant);
  formState[tid]={};
  refreshCounts();
  toast('บันทึกสำเร็จ ✓','green');

  // Sync to Sheets (fire-and-forget, no-cors)
  const url=getSheetsURL();
  if(url){
    syncStatus='syncing'; updateStatusUI();
    pushToSheets(tool.key,rec).then(()=>{
      syncStatus='connected'; updateStatusUI();
      toast('ซิงค์ Sheets แล้ว 📡','green');
    });
  }
  nav(tid);
}

async function syncTool(toolKey){
  const url=getSheetsURL(); if(!url){toast('ยังไม่ได้เชื่อมต่อ Sheets','red');return;}
  toast('กำลังซิงค์...','blue'); syncStatus='syncing'; updateStatusUI();
  const data=await pullFromSheets(toolKey);
  if(data){
    STORE.merge(toolKey,data.map(r=>({...r,_id:r._id||Date.now()+'',_date:r._date||''})));
    refreshCounts(); toast('ซิงค์สำเร็จ 📡','green'); syncStatus='connected';
  } else {
    toast('ซิงค์ล้มเหลว','red'); syncStatus='error';
  }
  updateStatusUI(); renderPage();
}

async function syncAllNow(){
  const url=getSheetsURL(); if(!url){openSettings();return;}
  toast('กำลังซิงค์ทั้งหมด...','blue'); syncStatus='syncing'; updateStatusUI();
  const all=await pullAllFromSheets();
  if(all){
    TOOLS.forEach(t=>{ if(all[t.key]) STORE.merge(t.key,all[t.key].map(r=>({...r,_id:r._id||Date.now()+'',_date:r._date||''}))); });
    refreshCounts(); toast('ซิงค์ทั้งหมดสำเร็จ 📡','green'); syncStatus='connected';
  } else {
    toast('ซิงค์ล้มเหลว','red'); syncStatus='error';
  }
  updateStatusUI(); renderPage();
}

function delRec(key,id){
  if(!confirm('ลบรายการนี้?'))return;
  STORE.del(key,id); refreshCounts(); toast('ลบแล้ว','red'); renderPage();
}

function exportCSV(key){
  const data=STORE.get(key); if(!data.length){toast('ไม่มีข้อมูล','red');return;}
  const keys=[...new Set(data.flatMap(r=>Object.keys(r)))];
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>JSON.stringify(r[k]||'')).join(','))].join('\n');
  dl(key+'_'+Date.now()+'.csv',csv); toast('ส่งออก CSV สำเร็จ','green');
}

function exportAll(){
  let out='';
  TOOLS.forEach(t=>{
    const d=STORE.get(t.key);if(!d.length)return;
    const k=[...new Set(d.flatMap(r=>Object.keys(r)))];
    out+='# '+t.name+'\n'+k.join(',')+'\n'+d.map(r=>k.map(k2=>JSON.stringify(r[k2]||'')).join(',')).join('\n')+'\n\n';
  });
  if(!out){toast('ยังไม่มีข้อมูล','red');return;}
  dl('community_data.csv',out); toast('ส่งออกสำเร็จ','green');
}

function dl(name,content){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8'}));
  a.download=name;a.click();
}

function toast(msg,type){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const col={green:'#16a34a',blue:'#2563eb',red:'#dc2626'};
  const el=document.createElement('div');
  el.className='toast';el.style.background=col[type]||'#374151';el.style.color='#fff';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.style.opacity='0',2200);setTimeout(()=>el.remove(),2500);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ─── INIT ────────────────────────────────────────────────
// If opened via shared URL, auto-save sheet URL (visitor mode)
if (_urlSheetParam) {
  const decoded = decodeURIComponent(_urlSheetParam);
  setSheetsURL(decoded); // persist so pushToSheets works
  syncStatus = 'connected';
  // Hide settings UI — visitor doesn't need to configure anything
  document.getElementById('settings-gear-btn').style.display  = 'none';
  document.getElementById('settings-bnav-btn').style.display  = 'none';
  document.getElementById('visitor-badge').classList.remove('hidden');
  // Also hide sidebar settings link
  const sideLink = document.querySelector('.snav[onclick*="openSettings"]');
  if (sideLink) sideLink.style.display = 'none';
} else {
  if(getSheetsURL()) syncStatus='connected';
}
refreshCounts(); updateNav(); renderPage();
</script>
